services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      LA_MOCK: ${LA_MOCK:-0}
      LA_MODEL_PATH: ${LA_MODEL_PATH:-nvidia/LocateAnything-3B}
      LA_DEFAULT_MODE: ${LA_DEFAULT_MODE:-hybrid}
      LA_DEVICE: ${LA_DEVICE:-0}
      LA_DATA_DIR: /data
      HF_HOME: /hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - la-data:/data
      - hf-cache:/hf_cache
    # The backend port is NOT published by default — the frontend reaches it
    # over the internal network, so only the frontend port needs to be free.
    # To expose it (direct API / remote-GPU access), add the override:
    #   docker compose -f docker-compose.yml -f docker-compose.expose-backend.yml up
    #
    # GPU passthrough (equivalent to `docker run --gpus all`). Requires the
    # NVIDIA Container Toolkit. For a no-GPU mock run, use:
    #   docker compose -f docker-compose.yml -f docker-compose.mock.yml up
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9080}:80"

volumes:
  la-data:
  hf-cache:
