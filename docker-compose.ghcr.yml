# End-user compose: pulls prebuilt images from GHCR — no source checkout or
# local build needed. Save this file as docker-compose.yml in an empty folder
# (alongside a .env if you want to customize), then:
#
#   docker compose pull
#   docker compose up
#
# Pin a release with LA_VERSION (e.g. LA_VERSION=v0.1.0); defaults to latest.
services:
  backend:
    image: ghcr.io/gammahazard/locate-anything-backend:${LA_VERSION:-latest}
    restart: unless-stopped
    environment:
      LA_MOCK: ${LA_MOCK:-0}
      LA_MODEL_PATH: ${LA_MODEL_PATH:-nvidia/LocateAnything-3B}
      LA_DEFAULT_MODE: ${LA_DEFAULT_MODE:-hybrid}
      LA_DEVICE: ${LA_DEVICE:-0}
      LA_DATA_DIR: /data
      HF_HOME: /hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - la-data:/data
      - hf-cache:/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    image: ghcr.io/gammahazard/locate-anything-frontend:${LA_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  la-data:
  hf-cache:
