name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + test, mock mode)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      # Install only the light deps + dev tools. Heavy GPU deps (torch,
      # transformers) live in requirements.txt and are NOT needed for the
      # mock-mode test suite — the worker imports them lazily.
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: pytest -q
        env:
          LA_MOCK: "1"

  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

  compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Validates compose syntax without building the heavy CUDA image
      # (no GPU runners available; real image is exercised on a GPU host).
      - run: docker compose config
